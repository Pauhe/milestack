name: Slither

permissions:
  actions: read
  contents: read
  security-events: write

on:
  push:
    paths:
      - "contracts/**"
      - ".github/workflows/slither.yml"
  pull_request:
    paths:
      - "contracts/**"
      - ".github/workflows/slither.yml"

jobs:
  slither:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Slither
        uses: crytic/slither-action@v0.4.1
        with:
          target: contracts
          sarif: contracts/slither-report.sarif
          slither-args: --filter-paths "contracts/lib|contracts/test" --exclude naming-convention,timestamp,incorrect-equality,uninitialized-local
          fail-on: medium

      - name: Upload Slither SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: contracts/slither-report.sarif
          category: slither
