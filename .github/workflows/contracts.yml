name: Contracts

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    paths:
      - "contracts/**"
      - ".github/workflows/contracts.yml"
      - ".github/workflows/slither.yml"
  pull_request:
    paths:
      - "contracts/**"
      - ".github/workflows/contracts.yml"
      - ".github/workflows/slither.yml"

jobs:
  forge-fmt:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: contracts

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
          cache: true
          cache-key: contracts-fmt-${{ github.ref_name }}-${{ hashFiles('contracts/foundry.toml', 'contracts/remappings.txt', 'contracts/src/**/*.sol', 'contracts/test/**/*.sol') }}
          cache-restore-keys: |
            contracts-fmt-${{ github.ref_name }}-
            contracts-fmt-

      - name: Show Forge version
        run: forge --version

      - name: Check formatting
        run: forge fmt --check

  forge-test:
    runs-on: ubuntu-latest
    needs: forge-fmt

    defaults:
      run:
        working-directory: contracts

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
          cache: true
          cache-key: contracts-test-${{ github.ref_name }}-${{ hashFiles('contracts/foundry.toml', 'contracts/remappings.txt', 'contracts/src/**/*.sol', 'contracts/test/**/*.sol') }}
          cache-restore-keys: |
            contracts-test-${{ github.ref_name }}-
            contracts-test-

      - name: Show Forge version
        run: forge --version

      - name: Run forge tests
        run: forge test

  forge-coverage:
    runs-on: ubuntu-latest
    needs: forge-test

    defaults:
      run:
        working-directory: contracts

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
          cache: true
          cache-key: contracts-coverage-${{ github.ref_name }}-${{ hashFiles('contracts/foundry.toml', 'contracts/remappings.txt', 'contracts/src/**/*.sol', 'contracts/test/**/*.sol') }}
          cache-restore-keys: |
            contracts-coverage-${{ github.ref_name }}-
            contracts-coverage-

      - name: Show Forge version
        run: forge --version

      - name: Run coverage
        run: forge coverage

      - name: Save coverage report
        run: forge coverage --report lcov --report-file lcov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: contracts-coverage-${{ github.run_id }}
          path: contracts/lcov.info
          if-no-files-found: error
